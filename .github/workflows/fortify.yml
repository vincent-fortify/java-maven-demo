name: Fortify Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 6'

permissions:
  contents: write

jobs:
  Fortify-SAST:
    permissions:
      contents: write
      security-events: write
      pull-requests: write  # Add this line
    runs-on: ubuntu-latest
    
    steps:    
      - name: Check out source code
        uses: actions/checkout@v4
          
      - name: Run Fortify on Demand SAST & SCA Scan
        uses: fortify/github-action@v3
        # with:
        #   sast-scan: true
        #   debricked-sca-scan: true
          # debricked-sca-scan: false
        env:
          FOD_URL: https://ams.fortify.com
          FOD_TENANT: FranklinBank24
          FOD_USER: vdeng
          FOD_PASSWORD: ${{secrets.FOD_PAT}}
          # FOD_RELEASE: ${{vars.FOD_RELEASE}}
          DO_SETUP: true
          DO_SCA_SCAN: true
          OVERRIDE_SAST_SETTINGS: "true"
          PACKAGE_EXTRA_OPTS: "-bt mvn -bf pom.xml"
          DO_WAIT: true
          DO_CHECK_POLICY: true
          DO_JOB_SUMMARY: true
          DO_EXPORT: true
          FOD_RELEASE: vincent-fortify/java-maven-demo:feature-1
          DO_PR_COMMENT: true